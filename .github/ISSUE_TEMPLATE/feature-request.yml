name: "Ошибка"
description: "Сообщить о некорректном поведении, регрессии или проблеме UX"
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Баг-репорт
        Заполните поля ниже. Чем точнее шаги воспроизведения и ожидаемое поведение, тем быстрее проблему получится локализовать.

  - type: textarea
    id: tldr
    attributes:
      label: TL;DR
      description: "Краткая суть проблемы в 1-2 предложениях"
      placeholder: "Что ломается, где и при каких условиях"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Проблема / симптомы
      description: "Что именно наблюдает пользователь сейчас"
      placeholder: "Опишите симптом, сообщение об ошибке, неверное поведение или UX-сбой"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: "Минимальная последовательность действий для воспроизведения"
      placeholder: |
        1. Открыть ...
        2. Выбрать ...
        3. Нажать ...
        4. Получить ошибку ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: "Что система должна была сделать вместо этого"
      placeholder: "Опишите корректный ожидаемый результат"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: "Что произошло по факту"
      placeholder: "Опишите фактический результат и последствия"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Контекст / окружение
      description: "Версия приложения, ОС, конфиг, тип репозитория, особые условия"
      placeholder: "Например: Linux, локальный path-repo, nested repo, config.yaml ..."
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: "Как проверить, что баг исправлен и не регрессировал"
      placeholder: |
        - [ ] Сценарий воспроизводится на старой версии
        - [ ] После исправления сценарий работает корректно
        - [ ] Смежный сценарий не сломан
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: "Гипотезы о причине, затронутые пакеты/модули, ссылки на код"
      placeholder: "Например: internal/git/, internal/config/, ResolveRepoPath()"
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: "Что явно не входит в исправление этой ошибки"
      placeholder: "Что не нужно менять в рамках этой задачи"
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: "Риски фикса, edge-cases, потенциальные регрессии"
      placeholder: "Что можно случайно сломать рядом"
    validations:
      required: false

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done / Verification
      description: "Финальная проверка перед закрытием задачи"
      placeholder: |
        - [ ] Добавлены/обновлены тесты
        - [ ] Проходит `make check`
        - [ ] Ручной сценарий подтвержден
        - [ ] Документация обновлена при необходимости
    validations:
      required: true
