name: "Вопрос"
description: "Задать вопрос по использованию, поведению или настройке приложения"
title: "question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ## Вопрос
        Заполните поля ниже. Чем точнее контекст и ожидаемый результат, тем быстрее получится дать полезный ответ.

  - type: textarea
    id: tldr
    attributes:
      label: TL;DR
      description: "Краткая суть вопроса в 1-2 предложениях"
      placeholder: "Что именно нужно понять или уточнить"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: "Что вы делаете, в каком сценарии возник вопрос, какой конфиг/режим используете"
      placeholder: "Опишите текущую задачу, окружение и важные детали"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Сам вопрос
      description: "Сформулируйте вопрос максимально конкретно"
      placeholder: "Что именно вы хотите узнать"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Что вы ожидали понять / получить
      description: "Какой ответ или результат был бы для вас полезен"
      placeholder: "Например: пример конфига, объяснение поведения, рекомендуемый workflow"
    validations:
      required: true

  - type: textarea
    id: attempts
    attributes:
      label: Что уже пробовали
      description: "Какие шаги, команды или варианты уже были проверены"
      placeholder: "Что уже проверили и к чему это привело"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Контекст / окружение
      description: "Версия приложения, ОС, конфиг, тип репозитория, особые условия"
      placeholder: "Например: Linux, browser transport, path-repo, multi-jira config"
    validations:
      required: false

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: "Ссылки на код, конфиг, логи или гипотезы, если они есть"
      placeholder: "Например: README, internal/config/, пример config.yaml"
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: "Что не нужно разбирать в рамках этого вопроса"
      placeholder: "Какие темы или варианты можно не рассматривать"
    validations:
      required: false

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done / Useful Answer
      description: "Когда вопрос можно считать закрытым"
      placeholder: |
        - [ ] Понятна причина поведения
        - [ ] Есть рекомендуемый способ использования
        - [ ] Есть пример или ссылка на релевантную документацию
    validations:
      required: true
