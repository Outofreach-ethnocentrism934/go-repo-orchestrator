name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  go-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l ./cmd ./internal)"
          if [ -n "$unformatted" ]; then
            echo "Found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: |
          pkg_patterns="./cmd/... ./internal/..."
          if [ -d ./pkg ]; then
            pkg_patterns="$pkg_patterns ./pkg/..."
          fi
          go test $(go list $pkg_patterns)

      - name: Vet
        run: |
          pkg_patterns="./cmd/... ./internal/..."
          if [ -d ./pkg ]; then
            pkg_patterns="$pkg_patterns ./pkg/..."
          fi
          go vet $(go list $pkg_patterns)

      - name: Build
        run: |
          pkg_patterns="./cmd/... ./internal/..."
          if [ -d ./pkg ]; then
            pkg_patterns="$pkg_patterns ./pkg/..."
          fi
          go build $(go list $pkg_patterns)

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m
