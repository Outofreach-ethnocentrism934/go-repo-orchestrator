name: Dependabot Auto Merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.repository == 'AgelxNash/go-repo-orchestrator' && github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Auto Merge Dependabot
        uses: ahmadnassri/action-dependabot-auto-merge@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          command: squash
