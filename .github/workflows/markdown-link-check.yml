name: Markdown Link Check
permissions:
  contents: read
on:
  push:
    paths: [ '**/*.md' ]
  pull_request:
    paths: [ '**/*.md' ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Monday
jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Markdown Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
