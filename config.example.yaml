browser:
  # CDP URL для подключения к уже запущенному Chromium (только при playwright: true)
  cdp_url: 'http://127.0.0.1:9222'

# Настройки Jira. Поддерживаются несколько инстансов.
# Транспорт:
#   playwright: true  -> Browser transport (ручной вход через браузер для SSO)
#   playwright: false -> HTTP transport (REST API)
# Авторизация HTTP:
#   token              -> Bearer auth (Authorization: Bearer <token>)
#   login.username/password -> Basic Auth (если token пуст)
# type: вспомогательное поле, не влияет на runtime-логику.
#
# Принцип связи веток с Jira-группами:
#   - jira[].group — идентификатор Jira-инстанса (например, "MARIADB").
#   - repos[].branch.jira — regex с named-group, имя которого МОЖЕТ совпадать с jira.group.
#   - Если имена совпадают, ключ тикета из ветки маппится на эту Jira-группу.
#   - Если использовать универсальное имя (?P<JIRA>...), ключ ищется во всех группах (fallback).
jira:
  - group: 'MARIADB'
    url: https://jira.mariadb.org/

# Примеры конфигурации Jira (раскомментируйте нужный):

# SSO/Playwright (браузерный вход через CDP):
#   - group: "MYPROJ"
#     url: "https://company.atlassian.net"
#     playwright: true
#   # Требуется запущенный Chromium с CDP (browser.cdp_url)

# HTTP + Bearer токен:
#   - group: "MYPROJ"
#     url: "https://company.atlassian.net"
#     token: "your_api_token_here"

# HTTP + Basic Auth:
#   - group: "MYPROJ"
#     url: "https://company.atlassian.net"
#     login:
#       username: "user@example.com"
#       password: "secret"

repos:
  - name: 'Repo orchestrator'
    url: git@github.com:AgelxNash/go-repo-orchestrator.git
    branch:
      keep:
        - '^main$'

  - name: 'MariaDB Connector/C'
    url: git@github.com:mariadb-corporation/mariadb-connector-c.git
    path: ./example/mariadb/c
    branch:
      keep:
        - '^(3\.[1-4])'
      jira:
        # Named-group "MARIADB" соответствует jira.group: 'MARIADB' (см. блок jira выше)
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'


  - name: 'MariaDB Connector/J'
    url: git@github.com:mariadb-corporation/mariadb-connector-j.git
    path: ./example/mariadb/j
    branch:
      keep:
        - '^(main|develop)$'
      jira:
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'


  - name: 'MariaDB Docs'
    url: git@github.com:mariadb-corporation/mariadb-docs.git
    path: ./example/mariadb/docs
    branch:
      autoswitch: main
      keep:
        - '^main$'
      jira:
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'


  - name: 'MariaDB QA'
    url: git@github.com:mariadb-corporation/mariadb-qa.git
    path: ./example/mariadb/qa
    branch:
      keep:
        - '^master$'
      jira:
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'


  - name: 'MariaDB Core storage engine'
    url: git@github.com:mariadb-corporation/mariadb-columnstore-engine.git
    path: ./example/mariadb/columnstore-engine
    branch:
      autoswitch: stable-23.10
      keep:
        - '^stable-(\d{2}\.\d{2})'
      jira:
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'


  - name: 'MariaDB Connector ODBC'
    url: git@github.com:mariadb-corporation/mariadb-connector-odbc.git
    path: ./example/mariadb/connector-odbc
    branch:
      keep:
        - '^(master|develop)$'
        - '^odbc\-3\.1$'
      jira:
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'


  - name: 'MaxScale'
    url: git@github.com:mariadb-corporation/MaxScale.git
    path: ./example/mariadb/max-scale
    branch:
      autoswitch: 24.02
      keep:
        - '^(2[2-4]}\.\d{2})$'
      jira:
        - '(^|[-/])(?P<MARIADB>(PMM|CONC|MDEV|MCOL|CONCPP|CONJ|CONJS|ODBC|CONPY|R2DBC|MDBF|MXS)\-\d+)'
