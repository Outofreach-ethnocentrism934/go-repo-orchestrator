# Локальный конфиг для Go commitlint (commitlint-go)
# Используется .githooks/commit-msg через --config .commitlint.yml
# GitHub Actions использует commitlint.config.mjs (Node.js версия)

min-version: v0.11.0
formatter: default
rules:
    - header-min-length
    - header-max-length
    - footer-max-line-length
    - body-max-line-length
    - type-enum
severity:
    default: error
    rules: {}
settings:
    header-min-length:
        argument: 10
        flags: {}
    header-max-length:
        argument: 100
        flags: {}
    footer-max-line-length:
        argument: 100
        flags: {}
    body-max-line-length:
        argument: 0
        flags: {}
    type-enum:
        argument:
            - feat
            - fix
            - docs
            - style
            - refactor
            - perf
            - test
            - build
            - ci
            - chore
            - revert
        flags: {}
disable-default-ignores: false
ignores: []
